name = "compliance-checker"
compatibility_date = "2024-12-01"

# D1 database for all persistent data
[[d1_databases]]
binding = "DB"
database_name = "compliance-checker-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# R2 bucket for PDF reports
[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "compliance-checker-reports"

# Queue for async scan processing (replaces sync scan-in-request)
[[queues]]
binding = "SCAN_QUEUE"
queue_name = "compliance-checker-scan-queue"

# KV for rate limiting and temporary data
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_ID"

[vars]
NEXT_PUBLIC_APP_URL = "https://compliance-checker.pages.dev"