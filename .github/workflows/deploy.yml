name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    # Skip if only docs/markdown changed
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(join(github.event.commits.*.modified, ''), '.md') ||
      !contains(join(github.event.commits.*.added, ''), 'DEPLOY.md') ||
      !contains(join(github.event.commits.*.modified, ''), 'TESTING_PLAN.md')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npx open-next build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: compliance-checker
          directory: .open-next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
