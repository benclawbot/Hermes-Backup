name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext bundle
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_PDF_REPORT: ${{ secrets.STRIPE_PRICE_PDF_REPORT }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          BROWSERLESS_API_KEY: ${{ secrets.BROWSERLESS_API_KEY }}

      - name: Remove build cache artifacts
        run: rm -rf .next/cache

      - name: Deploy to Cloudflare Pages (advanced mode)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_PDF_REPORT: ${{ secrets.STRIPE_PRICE_PDF_REPORT }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          npx wrangler pages deploy .open-next --project-name complyscan --branch main
          echo "Setting runtime secrets..."
          echo "$STRIPE_SECRET_KEY" | npx wrangler pages secret put STRIPE_SECRET_KEY --project complyscan
          echo "$STRIPE_PRICE_PDF_REPORT" | npx wrangler pages secret put STRIPE_PRICE_PDF_REPORT --project complyscan
          echo "$STRIPE_PRICE_MONTHLY" | npx wrangler pages secret put STRIPE_PRICE_MONTHLY --project complyscan
          echo "$STRIPE_WEBHOOK_SECRET" | npx wrangler pages secret put STRIPE_WEBHOOK_SECRET --project complyscan
          echo "$OPENAI_API_KEY" | npx wrangler pages secret put OPENAI_API_KEY --project complyscan
          echo "$OPENAI_BASE_URL" | npx wrangler pages secret put OPENAI_BASE_URL --project complyscan
          echo "$BROWSERLESS_API_KEY" | npx wrangler pages secret put BROWSERLESS_API_KEY --project complyscan






