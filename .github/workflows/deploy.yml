name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    # Skip if only docs/markdown changed
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(join(github.event.commits.*.modified, ''), '.md') ||
      !contains(join(github.event.commits.*.added, ''), 'DEPLOY.md') ||
      !contains(join(github.event.commits.*.modified, ''), 'TESTING_PLAN.md')
    steps:
      - name: Checkout repository
        run: |
          git init /home/runner/work/complyscan/complyscan
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/benclawbot/complyscan.git
          git fetch origin ${{ github.sha }} --depth=1
          git checkout ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npx open-next build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: compliance-checker
          directory: .open-next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
