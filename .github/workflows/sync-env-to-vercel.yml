name: Sync Environment Variables to Vercel

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:

  # Run on every push to main (after env vars are updated in GitHub Secrets)
  push:
    branches:
      - main

jobs:
  sync-env-to-vercel:
    name: Sync secrets to Vercel environment variables
    runs-on: ubuntu-latest
    # Skip if only docs/markdown changed
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(join(github.event.commits.*.modified, ''), '.md') ||
      !contains(join(github.event.commits.*.modified, ''), 'DEPLOY.md') ||
      !contains(join(github.event.commits.*.added, ''), '.md')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Configure Vercel CLI
        run: |
          vercel login --token ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}

      - name: Sync BROWSERLESS_API_KEY to Vercel
        run: |
          vercel env add BROWSERLESS_API_KEY production --value "${{ secrets.BROWSERLESS_API_KEY }}" --sensitive -y 2>/dev/null || \
          vercel env add BROWSERLESS_API_KEY production --value "${{ secrets.BROWSERLESS_API_KEY }}" --sensitive -y --force
        env:
          VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Sync OPENAI_API_KEY to Vercel
        run: |
          vercel env add OPENAI_API_KEY production --value "${{ secrets.OPENAI_API_KEY }}" --sensitive -y 2>/dev/null || \
          vercel env add OPENAI_API_KEY production --value "${{ secrets.OPENAI_API_KEY }}" --sensitive -y --force
        env:
          VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Sync STRIPE_SECRET_KEY to Vercel
        run: |
          vercel env add STRIPE_SECRET_KEY production --value "${{ secrets.STRIPE_SECRET_KEY }}" --sensitive -y 2>/dev/null || \
          vercel env add STRIPE_SECRET_KEY production --value "${{ secrets.STRIPE_SECRET_KEY }}" --sensitive -y --force
        env:
          VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Sync STRIPE_WEBHOOK_SECRET to Vercel
        run: |
          vercel env add STRIPE_WEBHOOK_SECRET production --value "${{ secrets.STRIPE_WEBHOOK_SECRET }}" --sensitive -y 2>/dev/null || \
          vercel env add STRIPE_WEBHOOK_SECRET production --value "${{ secrets.STRIPE_WEBHOOK_SECRET }}" --sensitive -y --force
        env:
          VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Sync RESEND_API_KEY to Vercel
        run: |
          vercel env add RESEND_API_KEY production --value "${{ secrets.RESEND_API_KEY }}" --sensitive -y 2>/dev/null || \
          vercel env add RESEND_API_KEY production --value "${{ secrets.RESEND_API_KEY }}" --sensitive -y --force
        env:
          VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Sync non-sensitive Vercel vars
        run: |
          vercel env add OPENAI_BASE_URL production --value "https://api.minimax.io/v1" -y 2>/dev/null || \
          vercel env add OPENAI_BASE_URL production --value "https://api.minimax.io/v1" -y --force

          vercel env add NEXT_PUBLIC_APP_URL production --value "https://complyscan2.vercel.app" -y 2>/dev/null || \
          vercel env add NEXT_PUBLIC_APP_URL production --value "https://complyscan2.vercel.app" -y --force

          vercel env add DATABASE_PATH production --value "/tmp/complyscan.db" -y 2>/dev/null || \
          vercel env add DATABASE_PATH production --value "/tmp/complyscan.db" -y --force

          vercel env add STRIPE_PRICE_SINGLE_SCAN production --value "${{ vars.STRIPE_PRICE_SINGLE_SCAN || secrets.STRIPE_PRICE_SINGLE_SCAN }}" -y 2>/dev/null || \
          vercel env add STRIPE_PRICE_SINGLE_SCAN production --value "${{ vars.STRIPE_PRICE_SINGLE_SCAN || secrets.STRIPE_PRICE_SINGLE_SCAN }}" -y --force

          vercel env add STRIPE_PRICE_MONTHLY production --value "${{ vars.STRIPE_PRICE_MONTHLY || secrets.STRIPE_PRICE_MONTHLY }}" -y 2>/dev/null || \
          vercel env add STRIPE_PRICE_MONTHLY production --value "${{ vars.STRIPE_PRICE_MONTHLY || secrets.STRIPE_PRICE_MONTHLY }}" -y --force
        env:
          VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Trigger Vercel production redeploy
        run: |
          echo "Environment variables synced. Triggering production redeploy..."
          # Use Vercel API to trigger a deployment
          curl -s -X POST \
            -H "Authorization: Bearer ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v13/deployments" \
            -H "Content-Type: application/json" \
            -d '{
              "gitSource": {
                "type": "github",
                "repo": "benclawbot/complyscan",
                "ref": "main"
              },
              "forceNewBuild": true,
              "skipAutoDetectionConfirmation": true
            }' | python3 -c "import sys,json; d=json.load(sys.stdin); print('Redeploy triggered:', d.get('id','N/A'), d.get('url','N/A'))"
        env:
          VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN || secrets.VERCEL_TOKEN }}
