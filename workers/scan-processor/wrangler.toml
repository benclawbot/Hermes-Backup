name = "compliance-checker-scan-processor"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "compliance-checker-db"
database_id = "3f5f083a-1943-46cd-b661-5df10f9fecce"
migrations_dir = "../../d1-migrations"

# Workers AI binding — model selection is configured in the Cloudflare dashboard
# to @cf/minimax/m2.5 (MiniMax-M2.5)
[ai]
binding = "AI"

# Queue consumer — receives jobs from the scan queue
[[queues.consumers]]
queue = "compliance-checker-scan-queue"

# Optional: Resend for email delivery in subscriber scans
# Set RESEND_API_KEY in wrangler secret or environment
[vars]